<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Bar Demo — Stage 6</title>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-ui); }
  </style>
</head>
<body>

  <!-- ============================================
       STATS BAR SECTION
       ============================================ -->
  <section class="stats-section">
    <div class="stats-grid">

      <div class="stats-item">
        <span class="stats-number">500+</span>
        <span class="stats-label">Propiedades</span>
      </div>

      <div class="stats-item">
        <span class="stats-number">10+</span>
        <span class="stats-label">Años de experiencia</span>
      </div>

      <div class="stats-item">
        <span class="stats-number">4.8</span>
        <span class="stats-label">Calificación</span>
      </div>

    </div>
  </section>

</body>
</html>
